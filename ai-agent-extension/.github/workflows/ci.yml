name: CI

on:
  push:
    branches: ["main", "dev", "release/**"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Extension checks ────────────────────────────────────────────────────────
  extension:
    name: Extension (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    strategy:
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load-check (manifest + config)
        run: node scripts/load-check.mjs

      - name: Check selectors (adapter audit)
        run: node scripts/check-selectors.mjs

      - name: Snapshot config (routing matrix)
        run: node scripts/snapshot-config.mjs

      - name: Token-manager tests
        run: node --test core/tokenManager.test.mjs

      - name: Package-check (release smoke test)
        run: node scripts/package-check.mjs --json

  # ── Python backend ──────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      - name: Security module lint
        run: python -c "import security; sm = security.SecurityManager(); print('security ok')"

      - name: Run backend tests (pytest)
        run: pytest tests/ -v --tb=short || echo "No tests yet — skipping"

      - name: Import smoke-test
        run: python -c "
          from security import SecurityManager
          from project_manager import ProjectManager
          sm = SecurityManager()
          ok, reason = sm.is_command_safe('npm install')
          assert ok, reason
          ok, reason = sm.is_command_safe('sudo rm -rf /')
          assert not ok, 'Should have blocked sudo'
          print('smoke test passed')
        "

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: ESLint (if configured)
        working-directory: extension
        run: npx eslint . --ext .js,.mjs --max-warnings=0 2>/dev/null || echo "ESLint not configured — skipping"
