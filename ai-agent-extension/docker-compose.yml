services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ai-agent-backend:local
    container_name: ai-agent-backend
    # Bind to 127.0.0.1 only — the extension talks to localhost.
    # Do NOT expose this port on a public interface.
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ./projects:/app/projects
      - ./memory:/app/memory
      - ./logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
